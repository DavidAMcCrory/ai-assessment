<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f5f0"/>
      <stop offset="100%" style="stop-color:#ede9e1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5f2ec;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="209" x2="1200" y2="209" stroke="rgba(15,15,15,0.06)" stroke-width="1"/>
  <line x1="0" y1="418" x2="1200" y2="418" stroke="rgba(15,15,15,0.06)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="627" stroke="rgba(15,15,15,0.06)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="627" stroke="rgba(15,15,15,0.06)" stroke-width="1"/>

  <!-- Shield icon -->
  <text x="88" y="148" font-family="system-ui" font-size="72" fill="#1a3a2a">🛡</text>

  <!-- Main title -->
  <text x="88" y="230" font-family="Georgia, serif" font-size="56" font-weight="400" fill="#1a3a2a" letter-spacing="-0.5">AI Governance</text>
  <text x="88" y="298" font-family="Georgia, serif" font-size="56" font-weight="400" fill="#1a3a2a" letter-spacing="-0.5">Risk Assessment</text>

  <!-- Divider -->
  <rect x="88" y="328" width="60" height="2" fill="rgba(26,58,42,0.35)" rx="1"/>

  <!-- Subtitle -->
  <text x="88" y="375" font-family="system-ui, sans-serif" font-size="22" font-weight="400" fill="#4a4a4a">For Regulated Financial Institutions</text>

  <!-- Domain pills -->
  <rect x="88" y="418" width="160" height="34" rx="4" fill="rgba(26,58,42,0.08)" stroke="rgba(26,58,42,0.15)" stroke-width="1"/>
  <text x="168" y="440" font-family="system-ui, sans-serif" font-size="13" fill="#1a3a2a" text-anchor="middle">8 Governance Domains</text>

  <rect x="262" y="418" width="130" height="34" rx="4" fill="rgba(26,58,42,0.08)" stroke="rgba(26,58,42,0.15)" stroke-width="1"/>
  <text x="327" y="440" font-family="system-ui, sans-serif" font-size="13" fill="#1a3a2a" text-anchor="middle">OSFI · EU AI Act</text>

  <rect x="406" y="418" width="155" height="34" rx="4" fill="rgba(26,58,42,0.08)" stroke="rgba(26,58,42,0.15)" stroke-width="1"/>
  <text x="483" y="440" font-family="system-ui, sans-serif" font-size="13" fill="#1a3a2a" text-anchor="middle">PIPEDA · FCA · SEC</text>

  <rect x="575" y="418" width="145" height="34" rx="4" fill="rgba(26,58,42,0.08)" stroke="rgba(26,58,42,0.15)" stroke-width="1"/>
  <text x="647" y="440" font-family="system-ui, sans-serif" font-size="13" fill="#1a3a2a" text-anchor="middle">90-Day Action Plan</text>

  <!-- Right side card -->
  <rect x="820" y="80" width="300" height="460" rx="8" fill="url(#card)" stroke="rgba(15,15,15,0.1)" stroke-width="1"/>

  <!-- Card content -->
  <text x="848" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#888888" letter-spacing="0.08em">GOVERNANCE SCORE</text>

  <!-- Domain score bars -->
  <text x="848" y="168" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Ethical Purpose</text>
  <rect x="848" y="176" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="176" width="192" height="5" rx="2" fill="#1a8a68"/>

  <text x="848" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Accountability</text>
  <rect x="848" y="218" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="218" width="144" height="5" rx="2" fill="#c07a00"/>

  <text x="848" y="252" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Transparency</text>
  <rect x="848" y="260" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="260" width="96" height="5" rx="2" fill="#c0392b"/>

  <text x="848" y="294" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Fairness</text>
  <rect x="848" y="302" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="302" width="168" height="5" rx="2" fill="#1a8a68"/>

  <text x="848" y="336" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Safety &amp; Resilience</text>
  <rect x="848" y="344" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="344" width="120" height="5" rx="2" fill="#c07a00"/>

  <text x="848" y="378" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Data Governance</text>
  <rect x="848" y="386" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="386" width="72" height="5" rx="2" fill="#c0392b"/>

  <text x="848" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Privacy</text>
  <rect x="848" y="428" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="428" width="210" height="5" rx="2" fill="#1a8a68"/>

  <text x="848" y="462" font-family="system-ui, sans-serif" font-size="12" fill="#4a4a4a">Third-Party Risk</text>
  <rect x="848" y="470" width="240" height="5" rx="2" fill="rgba(15,15,15,0.08)"/>
  <rect x="848" y="470" width="132" height="5" rx="2" fill="#c07a00"/>

  <!-- Bottom attribution -->
  <text x="88" y="582" font-family="system-ui, sans-serif" font-size="16" fill="#888888">davidamccrory.github.io/ai-assessment</text>
  <text x="1112" y="582" font-family="system-ui, sans-serif" font-size="16" fill="#888888" text-anchor="end">David McCrory</text>
</svg>
